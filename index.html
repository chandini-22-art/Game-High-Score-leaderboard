<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Speed Typing Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>⌨ Speed Typing Test</h1>

    <p id="text">
        Practice makes a person perfect in typing skills.
    </p>

    <textarea id="input" placeholder="Start typing here..."></textarea>

    <div class="info">
        <p>Time: <span id="time">60</span>s</p>
        <p>WPM: <span id="wpm">0</span></p>
    </div>

    <button onclick="restartTest()">Restart</button>
</div>

<script src="script.js"></script>

</body>
</html>
